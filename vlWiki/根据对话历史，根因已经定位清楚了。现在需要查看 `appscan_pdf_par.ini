根据对话历史，根因已经定位清楚了。现在需要查看 `appscan_pdf_parser.py` 的解析逻辑，确认 `revision` 字段的边界识别是怎么失效的。
找到了关键逻辑。让我重点分析 `_parse_field_block` 方法（第474-547行），这是解析 `revision` 字段的核心函数。

## 根因分析

### 问题出在 `_parse_field_block` 的边界识别

看第512行的 `section_boundaries`：

```python
section_boundaries = {'应用程序数据', '已访问的 URL', 'cookie', 'JavaScript', '失败的请求', '参数', '注释'}
```

**这个集合里有 `'cookie'`！**

当解析"加密会话（SSL）Cookie 中缺少 Secure 属性"的修复方法块时，块内容里如果出现 **"cookie"** 这个单词（英文小写），就会触发 `section_boundaries` 边界截断，导致 `revision` 字段提前结束——但**这不是这次污染的原因**。

---

### 真正的污染原因：`_extract_remediation_section` 的块切分逻辑

看第390-429行的 `_extract_remediation_section`：

```python
for idx, name in enumerate(type_names):
    pos = clean.find(name, cur_pos)
    ...
    after_name = pos + len(name)
    next_pos = len(clean)
    for next_name in type_names[idx + 1:]:
        p = clean.find(next_name, after_name)
        if p != -1 and p < next_pos:
            next_pos = p
```

**问题**：它用 `clean.find(name, cur_pos)` 来定位每个 type 的起始位置。如果某个 type 的名称是**另一个 type 名称的子串**，就会错误匹配。

但更关键的是第419-423行：

```python
if next_pos == len(clean):
    for tail in ['应用程序数据', '已访问的 URL', 'cookie', 'JavaScript']:
        p = clean.find(tail, after_name)
        if p != -1 and p < next_pos:
            next_pos = p
```

**`'cookie'` 在 `section_boundaries` 和这里的 `tail` 列表里都出现了**。当 `revision` 字段内容里包含 "cookie" 字符串时，`next_pos` 会被错误地设为 "cookie" 的位置，导致**块被提前截断**——但这也不会导致污染，只是丢失内容。

---

### 真正的问题：`revision` 字段的 `save_field` 逻辑

回到 `_parse_field_block` 第522-524行：

```python
if s.startswith('原因') and current_field and current_field != 'cause':
    save_field()
    break
```

**这个逻辑是：如果遇到以"原因"开头的行，且当前正在收集某个字段的内容，就保存当前字段并 `break` 退出。**

但 `_parse_field_block` 里 `revision` 之后应该还有 `cwe`、`references` 等字段。如果 PDF 里"修订建议"部分后面紧跟的是**下一个漏洞类型的"原因"**（而不是当前类型的"风险"或"CWE"），就会错误地 `break`。

