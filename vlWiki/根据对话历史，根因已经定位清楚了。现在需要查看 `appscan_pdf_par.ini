## 根因完整分析

### 污染内容来源

`VL-2026-010.md` 的 `## 修复建议` 后面的超长内容（"常规\n有多种减轻威胁的技巧..."），实际上来自 **SQL 注入的修复建议**，被错误地写入了"加密会话（SSL）Cookie 中缺少 Secure 属性"的 `revision` 字段。

### 污染是怎么发生的

看 `appscan_pdf_parser.py` 第696-710行：

```python
remediation_list = self._extract_remediation_section(text, all_type_names)
for vuln_type_data, remediation in zip(vuln_types.values(), remediation_list):
    if not remediation:
        continue
    for field in ['cause', 'revision']:
        if field in remediation:
            existing = vuln_type_data.get(field, '')
            if existing:
                vuln_type_data[field] = existing + '\n' ** remediation[field]  # ← 拼接！
            else:
                vuln_type_data[field] = remediation[field]
```

**关键问题**：`_extract_remediation_section` 返回的 `remediation_list` 与 `vuln_types.values()` 是**按位置一一对应**的（第698行 `zip`）。

但如果 `_extract_remediation_section` 对某个 type 的块切分错误（边界识别失败），就会把**下一个 type 的修复建议内容**吞入当前 type 的块里。

### 具体失效点：`_extract_remediation_section` 第419-423行

```python
if next_pos == len(clean):
    for tail in ['应用程序数据', '已访问的 URL', 'cookie', 'JavaScript']:
        p = clean.find(tail, after_name)
        if p != -1 and p < next_pos:
            next_pos = p
```

**`'cookie'` 作为 tail 边界**，但 "加密会话（SSL）Cookie 中缺少 Secure 属性" 的修复建议内容里包含大量 "cookie" 英文单词（从 `180` 页的内容可以看到，修复建议里反复出现 "cookie" 字符串）。

这导致 `next_pos` 被设为块内部第一个 "cookie" 出现的位置，从而**提前截断**当前块——但这不是污染的原因，这是**丢失内容**的原因。

### 真正的污染原因：`_parse_field_block` 没有正确识别 `revision` 的结束边界

看第479-486行的 `field_defs`：

```python
field_defs = [
    ('cause', ['原因']),
    ('risk', ['风险']),
    ('affected_products', ['受影响产品']),
    ('revision', ['修订建议']),
    ('cwe', ['CWE']),
    ('references', ['外部引用']),
]
```

**问题**：PDF 中"加密会话（SSL）Cookie 中缺少 Secure 属性"这个 type 在"修复方法"章节里，**可能没有独立的"修订建议"小节**，或者它的"修订建议"内容后面**紧跟的是"常规"这个标题**（这是 AppScan 的通用修复建议模板，不属于任何特定漏洞类型）。

`_parse_field_block` 遇到"常规"时，因为它不在 `field_defs` 的标签里，所以会被**继续收集到当前 `revision` 字段里**，直到遇到下一个 `field_defs` 里的标签（如"风险"、"CWE"、"外部引用"）或 `section_boundaries` 才会停止。

**而"常规"后面紧跟的就是 SQL 注入的完整修复建议模板**（这是 AppScan PDF 的通用内容），所以 `revision` 字段被污染了。

---

## 结论

**根因**：`_parse_field_block` 的 `field_defs` 里没有定义"常规"作为字段边界，导致"常规"后面的所有内容（SQL 注入修复建议模板）被错误地收集到当前 type 的 `revision` 字段里。

**修复方向**：在 `_parse_field_block` 里，把 `"常规"` 也作为一个字段边界（类似 `section_boundaries` 的处理方式），或者在 `field_defs` 里增加一个特殊标签来识别"通用修复建议"的开始位置，遇到时 `save_field()` 并 `break`。

